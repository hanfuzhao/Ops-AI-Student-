name: Data Quality Check

# I run the check every hour. The demand feed updates roughly hourly and the
# dashboard is used for real dispatch decisions, so waiting a whole day to
# catch bad data is too slow. The job only takes a minute or two so the cost
# is fine. Every 15 min would cost ~4x for not much gain given how often the
# feed actually changes. It also runs on push and can be triggered manually.

on:
  schedule:
    - cron: '0 * * * *'        # every hour
  push:
    branches: [main]
    paths:
      - 'week3/data/**'
      - 'week3/validation/**'
  workflow_dispatch:            # run manually

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true             # the parquet files are in Git LFS

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyarrow numpy

      - name: Run data quality validation
        id: validate
        working-directory: week3
        run: |
          # Runs the checks and writes validation-results.json. Exits with an
          # error if it finds critical/high issues.
          python3 -m validation.check_data_quality

      - name: Upload validation report
        if: always()            # upload the report even if the check failed
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: week3/validation-results.json

      - name: Block deployment if validation fails
        if: failure()
        run: |
          echo "::error::Data quality validation failed, blocking deployment."
          echo "The upstream feed has critical/high issues."
          echo "See the validation-report artifact for details."
          exit 1

      - name: Validation passed
        if: success()
        run: echo "Data quality validation passed, safe to deploy."
